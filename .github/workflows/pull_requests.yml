name: SNT malaria pull requests

on:
  pull_request:
    types: [ opened, synchronize, ready_for_review, edited ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  config:
    uses: BLSQ/iaso-ci/.github/workflows/wc_config.yml@cab0845861f3f205ac413b7967cd0bbaaeb09c8e
    permissions:
      pull-requests: write
      contents: read
    with:
      branch: ${{ github.head_ref || github.ref_name }}
      pr_title: ${{ github.event.pull_request.title }}

  build_and_push_image:
    needs: config
    uses: BLSQ/iaso-ci/.github/workflows/wc_docker_build.yml@cab0845861f3f205ac413b7967cd0bbaaeb09c8e
    with:
      branch: ${{ github.head_ref || github.ref_name }}
      image_tags: ${{ needs.config.outputs.image_tags }}
    secrets: inherit

  tests:
    uses: BLSQ/iaso-ci/.github/workflows/wc_tests.yml@cab0845861f3f205ac413b7967cd0bbaaeb09c8e
    with:
      branch: ${{ github.head_ref || github.ref_name }}
